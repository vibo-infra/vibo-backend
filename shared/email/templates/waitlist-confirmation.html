<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're in — VIBO</title>
</head>
<body style="margin:0;padding:0;background:#f0ede8;font-family:'Georgia','Times New Roman',serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f0ede8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:540px;">

          <!-- Logo / Brand bar -->
          <tr>
            <td style="padding:0 0 20px 0;text-align:center;">
              <span style="font-size:22px;font-weight:bold;letter-spacing:0.12em;color:#1a1208;text-transform:uppercase;">VIBO</span>
            </td>
          </tr>

          <!-- Main card -->
          <tr>
            <td style="background:#ffffff;border-radius:10px;border:1px solid #e2ddd6;overflow:hidden;">

              <!-- Accent top strip -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="background:#c2410c;height:4px;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>

              <!-- Body -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="padding:36px 32px 28px 32px;">

                    <!-- Position badge -->
                    <table role="presentation" cellspacing="0" cellpadding="0" style="margin-bottom:28px;">
                      <tr>
                        <td style="background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:10px 18px;">
                          <span style="font-size:13px;color:#9a3412;letter-spacing:0.06em;text-transform:uppercase;font-family:Georgia,serif;">Your spot</span>
                          <span style="display:block;font-size:38px;font-weight:bold;color:#c2410c;line-height:1.1;margin-top:2px;">#{{position}}</span>
                          <span style="font-size:13px;color:#9a3412;">{{spot_subtitle}}</span>
                        </td>
                      </tr>
                    </table>

                    <p style="margin:0 0 16px 0;font-size:18px;line-height:1.5;color:#1a1a1a;">
                      You're in.
                    </p>
                    <p style="margin:0 0 18px 0;font-size:16px;line-height:1.65;color:#3a3530;">{{intro_paragraph_inner}}</p>
                    <p style="margin:0 0 18px 0;font-size:16px;line-height:1.65;color:#3a3530;">
                      See ya soon. Stay tuned.
                    </p>

                    <!-- Divider -->
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:24px 0;">
                      <tr>
                        <td style="border-top:1px solid #f0ede8;font-size:0;line-height:0;">&nbsp;</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- Footer -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="background:#faf9f7;border-top:1px solid #ece9e4;padding:20px 32px 24px 32px;">
                    <p style="margin:0 0 6px 0;font-size:12px;line-height:1.6;color:#aaa;">
                      You joined the VIBO waitlist at <a href="{{site_url}}" style="color:#aaa;">{{site_url}}</a> using this email address.
                    </p>
                    <p style="margin:0;font-size:12px;line-height:1.6;color:#aaa;">
                      Got a question? Just reply here, or write to <a href="mailto:{{support_email}}" style="color:#aaa;">{{support_email}}</a>.
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
